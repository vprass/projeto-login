<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="stylesheet" href="estilos/media-types.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=person,vpn_key" />
</style>
</head>
<body>
    <main>
        <section id="login">
            <div id="imagem">
            </div>
            <div id="formulario">
                <h1>Login</h1>
                <p>Seja bem-vindo novamente. Faça o login para acessar sua conta e fazer a config do ambiente.</p>
                <form action="login.php" method="post">
                    <div class="entrada">
                        <label for="email"><span class="material-symbols-outlined">person
                        </span></label>
                        <input id="email" type="email" name="email" placeholder="Email" required>
                    </div>
                    <div class="entrada">
                        <label for="senha"><span class="material-symbols-outlined">vpn_key</span></label>
                        <input id="senha" type="password" name="senha" placeholder="Senha" required>
                    </div>
                    <div class="botoes">
                        <input id="entrar" class="botoes" type="submit" value="Entrar">
                        <input class="botoes" type="button" value="Esqueci a senha ✉">
                    </div>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
